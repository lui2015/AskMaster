<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>问大师 · 与投资大师对话</title>
  <link rel="stylesheet" href="css/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div id="app">
    <!-- ============ 左侧栏 ============ -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">问</div>
        <div class="brand-text">
          <h1>问大师</h1>
          <p>选一位大师，聊聊投资</p>
        </div>
      </div>

      <button class="btn btn-primary btn-block" id="btnNewChat">＋ 新建会话</button>

      <!-- 大师选择 -->
      <div class="panel">
        <div class="panel-title">
          <span>🎓 选择大师</span>
          <button class="link-btn" id="btnManageMasters">管理</button>
        </div>
        <div class="master-list" id="masterList"></div>
      </div>

      <!-- 会话列表 -->
      <div class="panel panel-flex">
        <div class="panel-title">
          <span>💬 会话列表</span>
          <button class="icon-btn" id="btnClearConvs" title="清空全部会话">🗑</button>
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <!-- 模型配置 -->
      <div class="panel">
        <div class="panel-title collapsible" id="modelPanelHeader">
          <span>⚙️ 模型配置 <em id="modelStatus" class="tag tag-warn">待配置</em></span>
          <span class="chevron" id="modelChevron">▾</span>
        </div>
        <div class="panel-body" id="modelPanelBody">
          <label class="field-label">快速预设（点击自动填充）</label>
          <div class="preset-grid" id="presetGrid"></div>

          <label class="field-label">API Key</label>
          <div class="key-input">
            <input type="password" id="inpApiKey" placeholder="请输入 API Key" />
            <button class="icon-btn" id="btnToggleKey" title="显示/隐藏">👁</button>
          </div>

          <label class="field-label">Base URL（OpenAI 兼容接口）</label>
          <input type="text" id="inpBaseUrl" placeholder="如 https://api.deepseek.com" />

          <label class="field-label">模型名</label>
          <input type="text" id="inpModel" placeholder="如 deepseek-chat / qwen-plus / glm-4" />

          <div class="row-2">
            <button class="btn btn-primary" id="btnSaveModel">💾 保存</button>
            <button class="btn btn-ghost" id="btnTestModel">🔌 测试连接</button>
          </div>
          <div class="test-result" id="testResult"></div>
        </div>
      </div>
    </aside>

    <!-- ============ 右侧主区 ============ -->
    <main class="main">
      <header class="main-header">
        <div class="current-master" id="currentMaster">
          <div class="cm-avatar" id="cmAvatar">🧓</div>
          <div class="cm-info">
            <div class="cm-name" id="cmName">沃伦·巴菲特</div>
            <div class="cm-desc" id="cmDesc">价值投资之父</div>
          </div>
        </div>
        <div class="analysis-mode">
          <label><input type="radio" name="mode" value="single" checked /> 个股分析</label>
          <label><input type="radio" name="mode" value="compare" /> 同行业对比</label>
        </div>
      </header>

      <section class="chat-area" id="chatArea"></section>

      <div class="samples" id="samples"></div>

      <footer class="composer">
        <textarea id="inpMessage" rows="1" placeholder="向大师提问，可输入股票名称或代码，如：贵州茅台 / 600519 值得长期持有吗？"></textarea>
        <button class="send-btn" id="btnSend" title="发送">↑</button>
      </footer>
    </main>
  </div>

  <!-- ============ 大师管理弹窗 ============ -->
  <div class="modal-mask" id="masterModal" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2 id="masterModalTitle">大师管理</h2>
        <button class="icon-btn" id="btnCloseMasterModal">✕</button>
      </div>
      <div class="modal-body" id="masterModalBody"></div>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="js/store.js"></script>
  <script src="js/masters.js"></script>
  <script src="js/models.js"></script>
  <script src="js/stock.js"></script>
  <script src="local-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
